spring.config.import=application_prod.properties,application_uat.properties
spring.profiles.active=uat

server.port=${PORT:8080}

spring.datasource.url=jdbc:mysql://localhost:3306/nexusAcademy
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.jakarta.persistence.validation.mode=none

# SQL initialization - runs custom SQL files on startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:nexusacademy_schema.sql
spring.sql.init.data-locations=classpath:nexusacademy_data.sql
spring.jpa.defer-datasource-initialization=true

spring.data.rest.basePath=/data-api

#debug=true
#trace=true

logging.level.root=INFO
#logging.level.com.learnspring.nexusAcademy.aspects = ERROR
#logging.level.com.learnspring.nexusAcademy.controller = ERROR

# Initialize log group nexusAcademy_error
logging.group.nexusacademy_error=com.learnspring.nexusacademy.aspects, com.learnspring.nexusacademy.controller
# Set log level to log group nexusacademy_error
logging.level.nexusacademy_error=ERROR

spring.output.ansi.enabled=ALWAYS

# Properties for @ConfigurationProperties (must be kebab-case)
nexus-academy.page-size=10
nexus-academy.contact.page-size=5
nexus-academy.contact.success-msg=Your message is submitted successfully.
nexus-academy.branches[0]=NewYork
nexus-academy.branches[1]=Delhi
nexus-academy.branches[2]=Paris
nexus-academy.branches[3]=Singapore

# Properties for @Value (can use any case)
nexus-academy.default-page-size=10
nexus-academy.contact-success-msg=Your message is submitted successfully.

# Actuator properties
management.endpoints.web.base-path=/nxs_academy/actuator
management.endpoints.web.exposure.include=*

spring.application.name=Nexus Academy

spring.boot.admin.client.url=http://localhost:9000

#or else app detects hostname of the machine and registers with that hostname in admin server
spring.boot.admin.client.instance.service-base-url=http://localhost:8080
spring.boot.admin.client.instance.management-base-url=http://localhost:8080
spring.boot.admin.client.instance.health-url=http://localhost:8080/nexusacademy/actuator/health
spring.boot.admin.client.instance.metadata.user.name=admin@nexusacademy.com
spring.boot.admin.client.instance.metadata.user.password=admin